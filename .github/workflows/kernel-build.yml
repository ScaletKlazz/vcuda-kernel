name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kernel-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and validate CMake
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          submodules: recursive
          persist-credentials: false

      - name: Install build dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            make \
            gcc \
            cmake \
            kmod \
            bc \
            bison \
            flex \
            libelf-dev \
            libssl-dev \
            dwarves \
            linux-headers-$(uname -r)

          test -d "/lib/modules/$(uname -r)/build"

      - name: Show build environment
        run: |
          set -euo pipefail

          uname -a
          gcc --version | head -n 1
          make --version | head -n 1
          cmake --version | head -n 1
          ls -ld "/lib/modules/$(uname -r)/build"

      - name: Build with Kbuild Makefile
        run: |
          set -euo pipefail

          make clean
          make -j"$(nproc)"

          test -f vgpu-kernel.ko
          modinfo ./vgpu-kernel.ko

      - name: Validate CMake configure and kernel-module target
        run: |
          set -euo pipefail

          cmake -S . -B build

          cmake --build build --target kernel-clean
          cmake --build build --target kernel-module -- -j"$(nproc)"

          test -f vgpu-kernel.ko
          modinfo ./vgpu-kernel.ko

      - name: Prepare artifact
        run: |
          set -euo pipefail

          mkdir -p dist
          cp -v vgpu-kernel.ko dist/

          for f in Module.symvers modules.order; do
            if [ -f "$f" ]; then
              cp -v "$f" dist/
            fi
          done

          modinfo vgpu-kernel.ko > dist/modinfo.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vgpu-kernel-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
